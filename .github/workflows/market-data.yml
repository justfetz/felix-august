name: Refresh market data

on:
  schedule:
    # Weekdays ~1.5h after the U.S. close (20:00 ET standard / 21:30 UTC-ish).
    - cron: "30 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Treasury yields and ticker quotes
        run: python3 tools/fetch_market_data.py

      - name: Commit refreshed data
        run: |
          if git diff --quiet data/market.json; then
            echo "market.json unchanged; nothing to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market.json
          git commit -m "Refresh market data"
          git push
